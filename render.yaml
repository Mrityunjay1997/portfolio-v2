services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: mk-ai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false          # set this in Render dashboard to your frontend URL
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: mk-ai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mk-ai-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false          # paste your key in the dashboard (optional)
      - key: CONTACT_TO_EMAIL
        value: krmrityunjay13@gmail.com
      - key: CHROMA_PERSIST_DIRECTORY
        value: /tmp/chroma

  # ── Frontend (Angular via Nginx) ───────────────────────────────────────────
  - type: web
    name: mk-ai-frontend
    runtime: docker
    region: oregon
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BACKEND_URL
        fromService:
          name: mk-ai-backend
          type: web
          property: host

databases:
  - name: mk-ai-postgres
    region: oregon
    plan: free
    databaseName: portfolio
    user: portfolio

  - name: mk-ai-redis
    region: oregon
    plan: free
